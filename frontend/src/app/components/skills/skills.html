<section class="skills" id="skills" appScrollReveal>
    <div class="section-header section-header--sidebar">
        <p class="section-header__eyebrow">Skills</p>
        <h2>Skills &amp; technologies</h2>
    </div>
    <div class="skills-grid">
        @for (group of skillGroups(); track group.category) {
        <div class="skills-grid__group">
            <h3 class="skills-grid__title">{{ group.category }}</h3>
            <div class="skills-grid__tags">
                @for (skill of group.skills; track skill.id) {
                <span class="tech-badge">{{ skill.name }}</span>
                }
            </div>
        </div>
        }
    </div>
</section>
