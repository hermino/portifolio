<section class="experiences" id="experience" appScrollReveal>
    <div class="section-header">
        <p class="section-header__eyebrow">Experience</p>
        <h2>Professional highlights</h2>
    </div>
    @for (exp of experiences(); track exp.id) {
    <div class="experience">
        <div class="experience__info">
            <div class="experience__role">
                <h3 class="experience__title">{{ exp.role }}</h3>
                <div class="experience__company">{{ exp.company }}</div>
            </div>
            <div><span class="experience__period">{{ exp.period }}</span></div>
        </div>
        <div class="experience__desc">
            <p>{{ exp.description }}</p>
            <div class="experience__activities">
                @for (activity of exp.activities; track activity) {
                <div class="experience__activity">{{ activity }}</div>
                }
            </div>
        </div>
        <div class="experience__techs">
            @for (tech of exp.technologies; track tech) {
            <span class="tech-badge">{{ tech }}</span>
            }
        </div>
    </div>
    }
</section>
