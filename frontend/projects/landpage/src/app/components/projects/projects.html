<section class="projects" id="projects" appScrollReveal>
    <div class="section-header">
        <p class="section-header__eyebrow">Work</p>
        <h2>Featured projects</h2>
    </div>
    <div class="project-grid">
        @for (proj of projects(); track proj.id) {
        <div class="project" [attr.data-category]="proj.categories.join(' ')">
            <h3 class="project__title">{{ proj.title }}</h3>
            <div>
                <span class="tech-badge tech-badge--business">{{ proj.client }}</span>
            </div>
            <p class="project__desc">{{ proj.description }}</p>
            <div class="project__techs">
                @for (tech of proj.technologies; track tech) {
                <span class="tech-badge">{{ tech }}</span>
                }
            </div>
            @if (proj.githubUrl || proj.liveUrl) {
            <div class="project__links">
                @if (proj.githubUrl) {
                <a class="project__link" [href]="proj.githubUrl" target="_blank" rel="noopener noreferrer">
                    <i class="ph-thin ph-github-logo" aria-hidden="true"></i>
                    GitHub
                </a>
                }
                @if (proj.liveUrl) {
                <a class="project__link" [href]="proj.liveUrl" target="_blank" rel="noopener noreferrer">
                    <i class="ph-thin ph-arrow-square-out" aria-hidden="true"></i>
                    Live
                </a>
                }
            </div>
            }
        </div>
        }
    </div>
</section>
