<button
  class="theme-toggle"
  [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  (click)="themeService.toggle()">
  @if (themeService.theme() === 'dark') {
    <i class="ph-thin ph-sun sun-icon" aria-hidden="true"></i>
  } @else {
    <i class="ph-thin ph-moon moon-icon" aria-hidden="true"></i>
  }
</button>
