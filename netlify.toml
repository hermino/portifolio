[build]
  base    = "frontend"
  command = "printf 'export const environment = { production: false, supabaseUrl: \"%s\", supabaseAnonKey: \"%s\" };' \"$SUPABASE_URL\" \"$SUPABASE_ANON_KEY\" > src/environments/environment.ts && printf 'export const environment = { production: true, supabaseUrl: \"%s\", supabaseAnonKey: \"%s\" };' \"$SUPABASE_URL\" \"$SUPABASE_ANON_KEY\" > src/environments/environment.prod.ts && npm run build && cp -r dist/admin/browser dist/hermino-portfolio-angular/browser/admin"
  publish = "dist/hermino-portfolio-angular/browser"

[build.environment]
  NODE_VERSION = "22"

# Admin SPA — must come before the catch-all
[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200

# Landpage SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
